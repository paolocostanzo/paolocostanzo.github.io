    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--black);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem}
    .wrap{max-width:900px;width:100%}
    .title{font-family:var(--mono);font-size:0.8rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;text-align:left}
    .term{background:var(--surface);border:1px solid var(--border);box-shadow:0 0 40px rgba(0,0,0,0.6);display:flex;flex-direction:column;height:80vh;max-height:80vh}
    .term-header{display:flex;align-items:center;gap:6px;padding:0.6rem 0.9rem;background:#0d0d0d;border-bottom:1px solid var(--border)}
    .th-dot{width:11px;height:11px;border-radius:50%}
    .th-label{font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-left:0.5rem}
    .th-spacer{flex:1}
    .th-status{font-family:var(--mono);font-size:0.65rem;color:var(--orange)}
    .term-body{flex:1;display:flex;flex-direction:column;padding:0.75rem 1rem;overflow:hidden}
    .term-out{flex:1;font-family:var(--mono);font-size:0.8rem;line-height:1.7;color:#ccc;overflow-y:auto;white-space:pre-wrap}
    .term-out::-webkit-scrollbar{width:4px}
    .term-out::-webkit-scrollbar-thumb{background:var(--border)}
    .ps1-row{display:flex;align-items:center;gap:0.5rem;padding-top:0.6rem;border-top:1px solid var(--border);margin-top:0.6rem}
    .ps1{font-family:var(--mono);font-size:0.8rem;color:var(--orange);white-space:nowrap}
    .inp{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:0.8rem;color:var(--text);caret-color:var(--orange)}
    .t0{color:var(--orange)}
    .t1{color:var(--muted)}
    .tg{color:#00ff88}
    .tr{color:#ff5555}
    .hint{font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-top:0.5rem;text-align:left}
    a{color:var(--orange);text-decoration:none}
    a:hover{text-decoration:underline}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:0.5rem}
    .home-link{font-family:var(--mono);font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
    .home-link:hover{color:var(--orange)}
    .lang-toggle{display:flex;border:1px solid var(--border);overflow:hidden}
    .lang-btn{font-family:var(--mono);font-size:0.65rem;padding:0.3rem 0.6rem;background:transparent;color:var(--muted);border:none;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all .2s}
    .lang-btn.active{background:var(--orange);color:var(--black)}
    .lang-btn:hover:not(.active){color:var(--orange)}
    @media(max-width:700px){.term{min-height:65vh}.term-out{font-size:0.78rem}}
  </style>

        const key = (input || '').trim();
        const m = key.match(/^(KEY|CHIAVE)\{(.+)\}$/i);

        const rawPayload = m[2].trim();
        const alias = PAYLOAD_ALIASES[rawPayload.toLowerCase()];

        out(' 1337/tcp open   ???');
        if(a.indexOf('-sV') !== -1){
          out('  │ banner: NonèCostanzo 404 node — ai mode: KEY{ai_paranoid}');
        } else {
          out(t().nmapNoVersion);
        }
      }
      function cmd_keys(){ out(t().keysFound(found.size)); }
      function cmd_unlock(arg){
        const payload = normalizePayload(arg);
        if(!arg || !arg.trim()){ out(t().usageUnlock); return; }
        if(!payload){ out(t().invalidFormat); return; }
        if(!VALID_PAYLOADS.includes(payload)){ out(t().invalidKey); return; }
        if(found.has(payload)){ out(t().keyExists); return; }
        found.add(payload);
        save();
        updateStatus();
        out(t().keySaved);
        if(found.size===5) out(t().allKeys);
      }
      function cmd_bio(){
        if(found.size<5){ t().accessDenied.forEach(out); return; }
        decodeBio().forEach(out);
      }
      function cmd_msf(){
        out(' Launching Metasploit Framework (404 edition)...');
        out(' [*] Loaded module: report/nonè/404_writeup');
        out(' [*] Session note: pentest_report => KEY{pentest_report}');
      }
      function cmd_home(){ try { window.location.href = '/'; } catch(e) {} }
      function cmd_clear(){ if(outEl) outEl.innerHTML = ''; }
      function banner(){ t().banner.forEach(out); }

      function handle(line){
        const raw = (line || '').trim();
        if(!raw) return;
        interacted = true;
        out(`<span class="t0">guest@nonè:404$</span> ${raw.replace(/</g,'&lt;')}`);
        const parts = raw.split(/\s+/);
        const typed = (parts[0] || '').toLowerCase();
        const base = canonicalCmd(typed);
        const arg = parts.slice(1).join(' ');
        switch(base){
          case 'help': cmd_help(); break;
          case 'challenges': cmd_challenges(); break;
          case 'hint': cmd_hint(arg); break;
          case 'whoami': cmd_whoami(); break;
          case 'ls': cmd_ls(); break;
          case 'cat': cmd_cat(arg); break;
          case 'nmap': cmd_nmap(arg); break;
          case 'msf': cmd_msf(); break;
          case 'keys': cmd_keys(); break;
          case 'unlock': cmd_unlock(arg); break;
          case 'bio': cmd_bio(); break;
          case 'home': cmd_home(); break;
          case 'clear': cmd_clear(); break;
          default: out(t().unknown(typed));
        }
      }

      setLang(resolveInitialLang());
      updateStatus();

      if(inEl){
        inEl.addEventListener('keydown',function(e){
          if(e.key==='Enter'){
            const v = inEl.value;
            inEl.value = '';
            handle(v);
          }
        });
        inEl.focus();
      }
    })();
  </script>
