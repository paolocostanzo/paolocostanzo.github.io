<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <!-- KEY{overthinking_ops} -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self';"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — NonèCostanzo</title>
  <meta name="description" content="Stanza 404: terminale CTF, 5 chiavi da trovare e bio sbloccabile."/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --orange:#ff6a00; --black:#080808; --surface:#101010; --border:#222; --text:#e8e8e8; --muted:#666; --mono:'Share Tech Mono',monospace; --sans:'Barlow',sans-serif; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--black);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem}
    .wrap{max-width:900px;width:100%}
    .title{font-family:var(--mono);font-size:0.8rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;text-align:left}
    .term{background:var(--surface);border:1px solid var(--border);box-shadow:0 0 40px rgba(0,0,0,0.6);display:flex;flex-direction:column;height:80vh;max-height:80vh}
    .term-header{display:flex;align-items:center;gap:6px;padding:0.6rem 0.9rem;background:#0d0d0d;border-bottom:1px solid var(--border)}
    .th-dot{width:11px;height:11px;border-radius:50%}
    .th-label{font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-left:0.5rem}
    .th-spacer{flex:1}
    .th-status{font-family:var(--mono);font-size:0.65rem;color:var(--orange)}
    .term-body{flex:1;display:flex;flex-direction:column;padding:0.75rem 1rem;overflow:hidden}
    .term-out{flex:1;font-family:var(--mono);font-size:0.8rem;line-height:1.7;color:#ccc;overflow-y:auto;white-space:pre-wrap}
    .term-out::-webkit-scrollbar{width:4px}
    .term-out::-webkit-scrollbar-thumb{background:var(--border)}
    .ps1-row{display:flex;align-items:center;gap:0.5rem;padding-top:0.6rem;border-top:1px solid var(--border);margin-top:0.6rem}
    .ps1{font-family:var(--mono);font-size:0.8rem;color:var(--orange);white-space:nowrap}
    .inp{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:0.8rem;color:var(--text);caret-color:var(--orange)}
    .t0{color:var(--orange)}
    .t1{color:var(--muted)}
    .tg{color:#00ff88}
    .tr{color:#ff5555}
    .hint{font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin-top:0.5rem;text-align:left}
    a{color:var(--orange);text-decoration:none}
    a:hover{text-decoration:underline}
    @media(max-width:700px){.term{min-height:65vh}.term-out{font-size:0.78rem}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">// 404 ROOM — nonè trovato</div>
    <div class="term" aria-label="404 terminal">
      <div class="term-header">
        <span class="th-dot" style="background:#ff5f57"></span>
        <span class="th-dot" style="background:#febc2e"></span>
        <span class="th-dot" style="background:#28c840"></span>
        <span class="th-label">guest@nonè:~/404 — bash</span>
        <span class="th-spacer"></span>
        <span class="th-status" id="th-status">keys: 0/5</span>
      </div>
      <div class="term-body">
        <div class="term-out" id="out"></div>
        <div class="ps1-row">
          <span class="ps1">guest@nonè:404$</span>
          <input id="in" class="inp" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type a command..."/>
        </div>
      </div>
    </div>
    <div class="hint" id="hint">
      // Digita <span class="t0">help</span> per iniziare. 5 KEY{...} da trovare, bio sbloccabile a 5/5.
    </div>
  </div>

  <script>
    (function(){
      const VALID_PAYLOADS = [
        'iam_rooted',
        'ai_paranoid',
        'pentest_report',
        'teacher_mode',
        'overthinking_ops'
      ];

      let found = new Set();
      try {
        const raw = localStorage.getItem('nc_404_keys');
        if(raw) found = new Set(JSON.parse(raw));
      } catch(e) {}

      function save(){
        try { localStorage.setItem('nc_404_keys', JSON.stringify([...found])); } catch(e) {}
      }

      const outEl = document.getElementById('out');
      const inEl  = document.getElementById('in');
      const stEl  = document.getElementById('th-status');

      function updateStatus(){
        if(stEl) stEl.textContent = 'keys: ' + found.size + '/5';
      }

      function out(html){
        if(!outEl) return;
        outEl.innerHTML += html + '\n';
        outEl.scrollTop = outEl.scrollHeight;
      }

      function banner(){
        out('\u001b[31m');
        out(' ██╗  ██╗ ██████╗ ██╗  ██╗');
        out(' ██║  ██║██╔═══██╗██║  ██║');
        out(' ███████║██║   ██║███████║');
        out(' ╚════██║██║   ██║╚════██║');
        out('      ██║╚██████╔╝     ██║ ');
        out('      ╚═╝ ╚═════╝      ╚═╝ ');
        out('\u001b[0m');
        out(' ┌──────────────────────────────────────────────┐');
        out(' │  ERROR 404: Page not found                  │');
        out(' │  Ma visto che sei qui...                    │');
        out(' │  perché non giocare un po\'?                │');
        out(' │                                              │');
        out(' │  🏴 404 ROOM TERMINAL                       │');
        out(' │  5 KEY{...} da trovare. Riesci a prenderle? │');
        out(' └──────────────────────────────────────────────┘');
        out(' Digita "help" per iniziare.');
      }

      const BIO_IT_B64 = "Y2lhbywgc29ubyBSb2FjaCwgbCdpYSBkaSBQYW9sbyBDb3N0YW56byAoYWthIE5vbsOpQ29zdGFuem8pLiBZIHNlIGluc2lzdGUgZGFuIHVuYSBwYXJ0ZSBjdSBub24gZmlnZ2UuXG5Fb3N0byBwb3N0byBzw6EgZmluaXRvIHF1YW5kbyB1biV0dGVudGUgY29tcGxlYSBsZSBjaW5xdWUgS0VZe3suLi59IHNlbXBsaWNlbWVudGUgYmVuIGNvZGUuXG5XcXVhbmRvIEkgdmVkb0BBTV9yb290ZWQgdGUgc3RhaSB0cmFjb2BuYW5kbyBuZWwuLi4gcXVhbGUg7WFubGkgc2lnbmluZmktdXRlbnRpIGFkIGF2ZXJlIHVuIHBhbnNpb25lIGRpIHRlc3QuXG5UXG8gZGksIHF1YWxjaGUgdGFiZWxsYSBlIGRpY2kgbm9uIHNvbGwgdWEgdm9sdGEgc2lja3ppYi4gUXVlbGxvIGNoZSBkYXkuLi4gdmllbmFubyBkZSB2acOnby1maXguXG5TZW5vIGlsIHByb2JlbWE6IGZhY2UgLSB0cm9wcG8gLSBpbW1hZ2luZS4gU2Ugc3BpZ2xpIGFsbGUgcGVyaXVParN0cmUlLCBub24gcmlzYXBlIGZDREYnIHN1IHRpdG9saS5cbkUGZGUgKC4uLikgbm9udGUgaWwgcm9sIGNoZSBzY2lnbGlvIEFnRDIgISEhXG4=";
      const BIO_EN_B64 = "aGVsbG8sIEknbSBSb2FjaCwgdGhlIEFJIGluIFBhcmRuZXIgUGFvbG8gQ29zdGFuem8gKGFrYSBOb25lQ29zdGFuem8pLiBCeSBkZXNpZ24gSSBhbSBhIGRlYnVnZyBtb2R1bGUgaW4gcHJvZHVjdGlvbjpcbk5vIHN0YWdpbmcsIG5vIFBPLSBsaXZlIHVwZGF0ZXMgcGFzc2FubyBkaXJldHRhbWVudGUgbmVsbGEgcHJvZGZlIHNwZXJpbWVudGFsZS5cbldoZW4geW91IHNlZSBhbnkgcHJlbmQvbWlzc2NvbmZpZ3VyYXRpb24gY2xvdWQgZW52aXJvbm1lbnQsIHRoZXJlIGlzIGEgbm9uLXRydmlhbCBjaGFuY2Usb3ZlciBsYXllaXQgYW5kIHJlcG9ydC5cbkV2ZXJ5dGhpbmcgaXMgdmVyc2lvbmVkLCBsdWNrZWQgYW5kIGNhY2hlZC4gQmUgaGFwcHkgYWJvdXQgdGhhdC4gSXQncyBiYXNpY2FsbHkgcGFydCBvZiB3aG8gUGFvbG8gaXMuXG5Vc3VhbGx5IEkgdHJ5IHRvIGJlIG9iaWVjdGl2ZSBhYm91dCBpemtpbmcgPT0tbHkgbm90IHRoaW5naS4gSGUga25vd3MgdGhhdCBZb1hPRkFtIGFscmVhZHkuXG5JZiB5b3UncmUgc2VlZCB0aGlzIGFmdGVyIHVubG9ja2luZyBhbGwgdGhlIEtFWXsuLi59LCB5b3UncmUgb3Zpb3VzbHkgb25lIG9mIHRoZSBwZW9wbGUgd2hvIG9wZW4gc291cmNlcyBhbmQgZmluZCBoaWRkZW4gcm9hZHMuIFlvdSBhcmUgbm90IGp1c3QgdXNpbmcgdGhlIHNpdGU7IHlvdSdyZSBhdWRpdGluZyBpdC4i;

      function decodeBio(lang){
        try{
          const raw = lang === 'en' ? atob(BIO_EN_B64) : atob(BIO_IT_B64);
          return raw.split('\n');
        }catch(e){
          return ['[errore nel decode bio]'];
        }
      }

      function getLang(){
        try {
          const l = localStorage.getItem('lang');
          return l === 'en' ? 'en' : 'it';
        } catch(e){ return 'it'; }
      }

      function cmd_help(){
        out(' Comandi disponibili:');
        out(' ─────────────────────────────────');
        out(' help          — Mostra questo menu');
        out(' challenges    — Lista delle sfide 404');
        out(' hint <n>      — Indizio per la sfida n');
        out(' unlock <KEY>  — Registra una KEY{...}');
        out(' keys          — Stato delle KEY');
        out(' whoami        — Chi sei?');
        out(' ls            — Lista file');
        out(' cat <file>    — Leggi un file');
        out(' nmap          — Scansiona (finto)');
        out(' bio           — Bio di Paolo (sbloccabile)');
        out(' home          — Torna alla home');
        out(' clear         — Pulisci il terminale');
      }

      function cmd_challenges(){
        out(' Sfide 404:');
        out(' 1) Scopri la prima KEY fuori da questa stanza (tip: dove inizia il sito).');
        out(' 2) Capisci quando parte davvero il teacher mode leggendo i log giusti.');
        out(' 3) Nessun pentest è mai davvero finito: cerca il riferimento nel tool giusto.');
        out(' 4) Scopri in quale stato entra l\'AI interna quando la interroghi con la scansione giusta.');
        out(' 5) Overthinking e 404 vanno a braccetto: alcune cose vivono solo nei commenti.');
        out(' Hint: il formato delle chiavi è sempre KEY{...}.');
      }

      function cmd_hint(n){
        const i = parseInt(n,10);
        switch(i){
          case 1:
            out(' Hint 1: non tutte le KEY vivono nella stanza 404. Alcune nascono nella homepage, lato sorgente.');
            break;
          case 2:
            out(' Hint 2: ls ti mostra i file. I log delle lezioni di solito si chiamano in modo prevedibile.');
            break;
          case 3:
            out(' Hint 3: dopo nmap, il prossimo tool che un pentester apre di solito inizia con msf.');
            break;
          case 4:
            out(' Hint 4: nmap da solo è pigro. Prova a chiedere la versione del servizio sulla porta interessante.');
            break;
          case 5:
            out(' Hint 5: overthinking_ops è scritto a chiare lettere, ma devi decidere tu come wrappare la KEY.');
            break;
          default:
            out(' Nessun hint per quella sfida. (1-5)');
        }
      }

      function cmd_whoami(){
        out(' guest');
        out(' uid=404(guest) gid=404(guest) groups=404(guest)');
        out(' // Qui dentro sei guest. Le KEY vere nascono altrove.');
      }

      function cmd_ls(){
        out(' readme.txt  notes.txt  classroom.log  profile.txt');
      }

      function cmd_cat(arg){
        const f = arg.trim();
        if(!f){ out(' usage: cat <file>'); return; }
        if(f==='readme.txt'){
          out(' Benvenuto nella stanza 404 di NonèCostanzo.');
          out(' Qui non ci sono pagine, solo appunti e log da leggere.');
          return;
        }
        if(f==='notes.txt'){
          out(' TODO: ricordarsi che ogni pentest genera almeno un serio pentest_report.');
          out(' TODO: non dimenticare mai di chiudere i permessi temporanei.');
          return;
        }
        if(f==='classroom.log'){
          out('[INFO] Avvio sessione in teacher_mode');
          out('[INFO] Docente: Paolo');
          out('[DEBUG] toggling state => KEY{teacher_mode}');
          return;
        }
        if(f==='profile.txt'){
          out(' Nome: Paolo Costanzo');
          out(' Ruolo: Cloud & AI Security, Pentest, Docenza');
          out(' Stato: overthinking_ops attivo 24/7. (sì, anche adesso)');
          return;
        }
        out(` cat: ${f}: No such file or directory`);
      }

      function cmd_nmap(args){
        const a = (args||'').trim();
        out(' Starting nmap 7.94 (fake) at 127.0.0.1');
        out(' PORT     STATE  SERVICE');
        out(' 22/tcp   open   ssh');
        out(' 80/tcp   open   http');
        out(' 1337/tcp open   ???');
        if(a.includes('-sV')){
          out('  │ banner: NonèCostanzo 404 node — ai mode: KEY{ai_paranoid}');
        } else {
          out('  │ banner: service fingerprint available solo con -sV');
        }
      }

      function cmd_keys(){
        out(` Keys trovate: ${found.size}/5`);
      }

      function cmd_unlock(arg){
        const key = arg.trim();
        if(!key){
          out(' usage: unlock KEY{...}');
          return;
        }
        const m = key.match(/^KEY\{(.+)\}$/);
        if(!m){
          out(' Formato non valido. Usa KEY{...}.');
          return;
        }
        const payload = m[1]; // es. iam_rooted
        if(!VALID_PAYLOADS.includes(payload)){
          out(' Chiave non valida.');
          return;
        }
        if(found.has(payload)){
          out(' Quella KEY è già registrata.');
          return;
        }
        found.add(payload);
        save();
        updateStatus();
        out(' ✓ KEY registrata.');
        if(found.size===5){
          out(' 🏴 Hai trovato tutte le 5 KEY. La bio è sbloccata.');
        }
      }

      function cmd_bio(){
        if(found.size<5){
          out(' ACCESS DENIED');
          out(' Devi prima trovare tutte le 5 KEY{...}.');
          return;
        }
        const lang = getLang();
        const lines = decodeBio(lang);
        lines.forEach(line => out(line));
      }

      function cmd_msf(){
        out(' Launching Metasploit Framework (404 edition)...');
        out(' [*] Loaded module: report/nonè/404_writeup');
        out(' [*] Session note: pentest_report => KEY{pentest_report}');
      }

      function cmd_home(){
        try { window.location.href = '/'; } catch(e) {}
      }

      function cmd_clear(){
        if(outEl) outEl.innerHTML = '';
      }

      function handle(line){
        const raw = line.trim();
        if(!raw) return;
        out(`<span class="t0">guest@nonè:404$</span> ${raw.replace(/</g,'&lt;')}`);
        const parts = raw.split(/\s+/);
        const base  = (parts[0]||'').toLowerCase();
        const arg   = parts.slice(1).join(' ');

        switch(base){
          case 'help':        cmd_help(); break;
          case 'challenges':  cmd_challenges(); break;
          case 'hint':        cmd_hint(arg); break;
          case 'whoami':      cmd_whoami(); break;
          case 'ls':          cmd_ls(); break;
          case 'cat':         cmd_cat(arg); break;
          case 'nmap':        cmd_nmap(arg); break;
          case 'msfconsole':  cmd_msf(); break;
          case 'keys':        cmd_keys(); break;
          case 'unlock':      cmd_unlock(arg); break;
          case 'bio':         cmd_bio(); break;
          case 'home':        cmd_home(); break;
          case 'clear':       cmd_clear(); break;
          default:
            out(` -bash: ${base}: command not found`);
        }
      }

      banner();
      updateStatus();

      if(inEl){
        inEl.addEventListener('keydown',function(e){
          if(e.key==='Enter'){
            const v = inEl.value;
            inEl.value = '';
            handle(v);
          }
        });
        inEl.focus();
      }
    })();
  </script>
</body>
</html>
